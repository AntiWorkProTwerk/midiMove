<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>midiMove</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; }
    *:not(dialog) { margin: 0; }
    button { font: inherit; }

    /* Live dark theme */
    :root {
      --p-live-ui-bg: hsl(0, 0%, 21%);
      --p-live-control-bg: hsl(0, 0%, 16%);
      --p-live-input-bg: hsl(0, 0%, 12%);
      --p-live-text-primary: hsl(0, 0%, 71%);
      --p-live-control-border: hsl(0, 0%, 7%);
      --p-live-text-secondary: hsl(0, 0%, 41%);
      --p-live-accent-primary: hsl(31, 100%, 67%);
      --p-live-control-text--enabled: hsl(0, 0%, 7%);

      --c-bg--0500: oklch(from var(--p-live-ui-bg) l c h);
      --c-text-primary: oklch(from var(--p-live-text-primary) l c h);
      --c-text-secondary: oklch(from var(--p-live-text-secondary) l c h);
      --c-control-bg--400: oklch(from var(--p-live-control-bg) calc(l * 0.9) c h);
      --c-control-bg--500: oklch(from var(--p-live-control-bg) l c h);
      --c-control-border: oklch(from var(--p-live-control-border) l c h);
      --c-control-outline: var(--c-text-secondary);
      --c-control-on-foreground: oklch(from var(--p-live-control-text--enabled) l c h);
      --c-highlight--primary: oklch(from var(--p-live-accent-primary) l c h);
    }

    html {
      background-color: var(--c-bg--0500);
      color: var(--c-text-primary);
      font-family: "AbletonSansSmall", sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }

    body {
      height: 100%;
      display: flex;
      padding: 1.1em;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0.75em;
      width: 100%;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title { font-size: 1.55rem; color: var(--c-text-primary); }
    .head-nav { display: flex; align-items: center; gap: 0.45em; }
    .count { font-size: 1rem; color: var(--c-text-secondary); font-variant-numeric: tabular-nums; margin-right: 0.35em; }
    .nav-btn { width: 30px; padding: 0; text-align: center; }

    #preview {
      width: 100%;
      height: 120px;
      display: block;
      border: 1px solid var(--c-control-border);
      border-radius: 4px;
    }

    .desc {
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--c-text-secondary);
      min-height: 3.2em;
    }

    .alx-button {
      font-size: 1rem;
      line-height: 1;
      background-color: var(--c-control-bg--500);
      color: var(--c-text-primary);
      border: 1px solid var(--c-control-border);
      height: 22px;
      padding: 0 1em;
      border-radius: 1em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .alx-button:hover { background-color: var(--c-control-bg--400); }
    .alx-button:active,
    .alx-button.primary {
      color: var(--c-control-on-foreground);
      background-color: var(--c-highlight--primary);
    }
    .alx-button.primary:hover { filter: brightness(1.08); }
    .alx-button:focus-visible { outline: 2px solid var(--c-control-outline); }

    .actions { display: flex; gap: 0.6em; }
    .actions .primary { flex: 1; }

    .controls { display: flex; flex-wrap: wrap; gap: 0.7em 1.2em; }
    .controls .ctl { flex: 1 1 40%; }
    .controls .ctl.check { flex: 1 1 40%; align-self: end; padding-bottom: 0.2em; }
    .ctl { display: flex; flex-direction: column; gap: 0.3em; font-size: 0.95rem; color: var(--c-text-secondary); }
    .ctl > span { display: flex; justify-content: space-between; }
    .ctl output { color: var(--c-text-primary); font-variant-numeric: tabular-nums; }
    .ctl.check { flex-direction: row; align-items: center; gap: 0.5em; cursor: pointer; }
    .ctl.check small { color: var(--c-text-secondary); opacity: 0.75; margin-left: 0.3em; }

    /* Everything from the share row down is pinned to the bottom of the card,
       so spare height sits between the controls and the action bar instead of
       dangling as dead space below the buttons. */
    .share-row { margin-top: auto; }
    .alx-range { width: 100%; accent-color: var(--c-highlight--primary); cursor: pointer; }
    input[type="checkbox"] { accent-color: var(--c-highlight--primary); cursor: pointer; }

    .draw-controls { display: flex; align-items: center; gap: 0.6em; }
    .draw-controls .draw-spread { flex: 1; }
    .draw-controls .ctl { gap: 0.15em; }
    .alx-select {
      background-color: var(--c-control-bg--500); color: var(--c-text-primary);
      border: 1px solid var(--c-control-border); border-radius: 4px; height: 20px; cursor: pointer;
    }

    .share-row { display: flex; align-items: center; gap: 0.5em; }
    .share-label { font-size: 0.95rem; color: var(--c-text-secondary); }
    .share-row .alx-button { height: 20px; padding: 0 0.8em; }
    .share-hint { font-size: 0.9rem; color: var(--c-highlight--primary); margin-left: auto; }
    .share-panel { display: flex; gap: 0.5em; align-items: stretch; }
    .alx-textarea {
      flex: 1; resize: none; font-family: monospace; font-size: 0.82rem;
      background-color: hsl(0, 0%, 12%); color: var(--c-text-primary);
      border: 1px solid var(--c-control-border); border-radius: 4px; padding: 0.3em;
    }
    .share-actions { display: flex; flex-direction: column; gap: 0.3em; }
    .share-actions .alx-button { height: 20px; padding: 0 0.6em; }

    .running {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 0.95rem;
      color: var(--c-text-secondary);
      border-top: 1px solid var(--c-control-border);
      padding-top: 0.45em;
    }
    .running b { color: var(--c-highlight--primary); font-weight: 500; }
    .running .alx-button { margin-left: auto; height: 20px; padding: 0 0.85em; }
    [hidden] { display: none !important; }
  </style>
</head>

<body>
  <div class="card">
    <div class="head">
      <div class="title" id="name">—</div>
      <div class="head-nav">
        <span class="count" id="count">—</span>
        <button class="alx-button nav-btn" id="prev" title="Previous mode">◀</button>
        <button class="alx-button nav-btn" id="next" title="Next mode">▶</button>
      </div>
    </div>
    <canvas id="preview" width="312" height="120"></canvas>
    <p class="desc" id="desc"></p>
    <div class="draw-controls" id="drawControls" hidden>
      <button class="alx-button" id="clearPath">Clear</button>
      <label class="ctl draw-spread">
        <span>Spread</span>
        <input class="alx-range" type="range" id="spread" min="0" max="1" step="0.02" />
      </label>
      <label class="ctl draw-loop">
        <span>Loop</span>
        <select id="loop" class="alx-select">
          <option value="1">1 beat</option>
          <option value="2">2 beats</option>
          <option value="4">1 bar</option>
          <option value="8">2 bars</option>
        </select>
      </label>
    </div>
    <div class="controls">
      <label class="ctl">
        <span>Width (time) <output id="widthVal">1×</output></span>
        <input class="alx-range" type="range" id="width" min="0.25" max="3" step="0.05" />
      </label>
      <label class="ctl">
        <span>Length (pitch) <output id="heightVal">1×</output></span>
        <input class="alx-range" type="range" id="height" min="0.25" max="3" step="0.05" />
      </label>
      <label class="ctl">
        <span>Speed <output id="speedVal">1×</output></span>
        <input class="alx-range" type="range" id="speed" min="0.1" max="2" step="0.05" />
      </label>
      <label class="ctl check">
        <input type="checkbox" id="snap" />
        <span>Snap to key <small id="scaleName"></small></span>
      </label>
    </div>
    <div class="share-row">
      <span class="share-label">Share code</span>
      <button class="alx-button" id="exportBtn">Export</button>
      <button class="alx-button" id="importBtn">Import</button>
      <span class="share-hint" id="shareHint"></span>
    </div>
    <div class="share-panel" id="sharePanel" hidden>
      <textarea id="shareText" class="alx-textarea" rows="2" spellcheck="false"></textarea>
      <div class="share-actions">
        <button class="alx-button primary" id="shareDo">Copy</button>
        <button class="alx-button" id="shareCancel">✕</button>
      </div>
    </div>
    <div class="actions">
      <button class="alx-button" id="close">Close</button>
      <button class="alx-button primary" id="apply">Apply</button>
    </div>
    <div class="running" id="running" hidden>
      Running: <b id="runningName"></b>
      <button class="alx-button" id="stop">Stop</button>
    </div>
  </div>

  <script>
    // Injected by extension.ts (chooserUrl). Shape:
    //   { modes:[{id,name,description}], physics:{...}, activeModeId,
    //     options:{width,height,snapToKey}, scale:{root,intervals},
    //     path:[[dx,dy],…]|null, spread, periodBeats }
    const CONFIG = __MIDIMOVE_CONFIG__;
    const MODES = CONFIG.modes;
    const PH = CONFIG.physics;
    const OPT = CONFIG.options || { width: 1, height: 1, snapToKey: false };
    const SCALE = CONFIG.scale || { root: 0, intervals: [] };
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const DEFAULT_PERIOD = (PH.path && PH.path.periodBeats) || 4;

    // Live, user-adjustable state (sliders + checkbox + draw pad).
    let width = OPT.width, height = OPT.height, snap = OPT.snapToKey;
    let speed = typeof OPT.speed === "number" ? OPT.speed : 1;
    let drawnPath = Array.isArray(CONFIG.path) ? CONFIG.path.map((p) => [p[0], p[1]]) : [];
    let spread = typeof CONFIG.spread === "number" ? CONFIG.spread : 0;
    let period = (typeof CONFIG.periodBeats === "number" && CONFIG.periodBeats > 0) ? CONFIG.periodBeats : DEFAULT_PERIOD;

    // Mirrors the engine's snapToScale: nearest pitch in the current scale.
    function snapPitch(p) {
      if (!snap || !SCALE.intervals.length) return p;
      const r = Math.round(p);
      const allowed = new Set(SCALE.intervals.map((iv) => (((iv + SCALE.root) % 12) + 12) % 12));
      for (let dd = 0; dd <= 6; dd++) {
        if (allowed.has((((r - dd) % 12) + 12) % 12)) return r - dd;
        if (allowed.has((((r + dd) % 12) + 12) % 12)) return r + dd;
      }
      return r;
    }

    // ----- host messaging (same protocol as the modal-dialog example) -------
    const isWebKit = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;
    function doSendMessage(message) {
      if (isWebKit) window.webkit.messageHandlers.live.postMessage(message);
      else if (isWebView2) window.chrome.webview.postMessage(message);
    }
    function closeWith(action, modeId) {
      doSendMessage({
        method: "close_and_send",
        params: [JSON.stringify({
          action, modeId, width, height, snapToKey: snap, speed,
          path: drawnPath, spread, periodBeats: period,
        })],
      });
    }

    // ----- physics preview (mirrors the engine, fed by CONFIG.physics) ------

    // Deterministic helpers — identical to the engine's, so the preview matches.
    const smoothNoise = (seed, t) =>
      (Math.sin(t * 1.1 + seed) + Math.sin(t * 1.7 + seed * 2.3 + 1.3) + Math.sin(t * 0.6 + seed * 3.7 + 2.9)) / 3;
    const triWave = (u) => { const f = u - Math.floor(u); return f < 0.5 ? 4 * f - 1 : 3 - 4 * f; };

    // Returns { dx (beats), dy (semitones) } for preview note `i` of `n`.
    function disp(id, i, n, restX, restY, beats) {
      if (id === "pendulum") {
        const p = PH.pendulum;
        const theta = p.theta0 * Math.cos(((2 * Math.PI) / p.periodBeats) * beats);
        return { dx: p.hAmp * Math.sin(theta), dy: p.vAmp * (1 - Math.cos(theta)) };
      }
      if (id === "orbit") {
        const p = PH.orbit, ang = (2 * Math.PI * beats) / p.periodBeats, phase = (i / n) * 2 * Math.PI;
        return { dx: p.rTime * Math.cos(ang + phase), dy: p.rPitch * Math.sin(ang + phase) };
      }
      if (id === "wave") {
        const p = PH.wave, phase = 2 * Math.PI * (restX / BAR - beats / p.periodBeats);
        return { dx: 0, dy: p.ampPitch * Math.sin(phase) };
      }
      if (id === "drift") {
        const p = PH.drift, t = beats * p.rate, seed = (i + 1) * 1.7;
        return { dx: p.ampTime * smoothNoise(seed, t), dy: p.ampPitch * smoothNoise(seed + 100, t) };
      }
      if (id === "bounce") {
        const p = PH.bounce;
        return {
          dx: p.ampTime * triWave(beats * p.vTime + i * 0.37),
          dy: p.ampPitch * triWave(beats * p.vPitch + i * 0.61 + 0.25),
        };
      }
      if (id === "cascade") {
        const p = PH.cascade;
        let d = (beats / p.sweepBeats - restX / BAR) % 1; if (d < 0) d += 1;
        const env = Math.exp(-p.decay * d);
        return {
          dx: p.ampTime * env * Math.sin(2 * Math.PI * p.freq * d),
          dy: p.ampPitch * env * Math.cos(2 * Math.PI * p.freq * d),
        };
      }
      if (id === "pulse") {
        const p = PH.pulse, s = 1 + p.amp * Math.sin((2 * Math.PI * beats) / p.periodBeats);
        let cx = 0, cy = 0;
        for (const r of REST) { cx += r.x; cy += r.y; }
        cx /= REST.length; cy /= REST.length;
        return { dx: (restX - cx) * (s - 1), dy: (restY - cy) * (s - 1) };
      }
      return { dx: 0, dy: 0 };
    }

    // ----- canvas rendering -------------------------------------------------
    const BAR = 4;                 // preview bar length (beats)
    const PREVIEW_BPS = 2;         // 120 BPM → 2 beats/sec
    const PCENTER = 64, PRANGE = 24;
    const REST = [                 // a chord spread across the bar
      { x: 0.6, y: 58 }, { x: 1.4, y: 62 }, { x: 2.2, y: 65 }, { x: 3.0, y: 69 },
    ];
    const COL = {
      panel: "hsl(0, 0%, 12%)",
      grid: "hsl(0, 0%, 18%)",
      gridStrong: "hsl(0, 0%, 24%)",
      ghost: "hsla(0, 0%, 50%, 0.22)",
      note: "hsl(31, 100%, 67%)",
    };

    const cv = document.getElementById("preview");
    const cx = cv.getContext("2d");
    const W = cv.width, H = cv.height, PAD = 16;
    const NOTE_W = (0.45 / BAR) * (W - 2 * PAD);
    const NOTE_H = Math.max(6, (1 / PRANGE) * (H - 2 * PAD) * 1.6);
    const xToPx = (b) => PAD + (b / BAR) * (W - 2 * PAD);
    const yToPx = (pitch) => PAD + (1 - (pitch - (PCENTER - PRANGE / 2)) / PRANGE) * (H - 2 * PAD);
    const clampNum = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function rr(x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      cx.beginPath();
      cx.moveTo(x + r, y);
      cx.arcTo(x + w, y, x + w, y + h, r);
      cx.arcTo(x + w, y + h, x, y + h, r);
      cx.arcTo(x, y + h, x, y, r);
      cx.arcTo(x, y, x + w, y, r);
      cx.closePath();
    }

    function draw(beats) {
      cx.fillStyle = COL.panel;
      cx.fillRect(0, 0, W, H);
      cx.lineWidth = 1;
      cx.strokeStyle = COL.grid;
      for (let b = 1; b < BAR; b++) {
        const x = Math.round(xToPx(b)) + 0.5;
        cx.beginPath(); cx.moveTo(x, PAD * 0.5); cx.lineTo(x, H - PAD * 0.5); cx.stroke();
      }
      cx.strokeStyle = COL.gridStrong;
      const yc = Math.round(yToPx(PCENTER)) + 0.5;
      cx.beginPath(); cx.moveTo(PAD * 0.5, yc); cx.lineTo(W - PAD * 0.5, yc); cx.stroke();

      const id = MODES[index].id, n = REST.length;
      // rest ghosts first
      cx.fillStyle = COL.ghost;
      for (const rest of REST) { rr(xToPx(rest.x), yToPx(rest.y) - NOTE_H / 2, NOTE_W, NOTE_H, 3); cx.fill(); }
      // animated notes
      cx.fillStyle = COL.note;
      REST.forEach((rest, i) => {
        const d = disp(id, i, n, rest.x, rest.y, beats);
        const px = xToPx(clampNum(rest.x + d.dx * width, 0, BAR));
        const py = yToPx(clampNum(snapPitch(rest.y + d.dy * height), PCENTER - PRANGE / 2, PCENTER + PRANGE / 2));
        rr(px, py - NOTE_H / 2, NOTE_W, NOTE_H, 3);
        cx.fill();
      });
    }

    // ----- draw pad (path mode) ---------------------------------------------
    const padToPx = (nx, ny) => [W / 2 + nx * (W / 2 - PAD), H / 2 - ny * (H / 2 - PAD)];
    const pxToNorm = (px, py) => [
      clampNum((px - W / 2) / (W / 2 - PAD), -1, 1),
      clampNum(-(py - H / 2) / (H / 2 - PAD), -1, 1),
    ];

    // Identical to the engine's samplePath (closed loop, wraparound lerp).
    function samplePath(points, phase) {
      const n = points.length;
      if (n === 0) return [0, 0];
      if (n === 1) return points[0];
      const f = ((phase % 1) + 1) % 1;
      const t = f * n, i = Math.floor(t) % n, j = (i + 1) % n, frac = t - Math.floor(t);
      const a = points[i], b = points[j];
      return [a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac];
    }

    let drawing = false, rawStroke = [];
    function drawPad(beats) {
      cx.fillStyle = COL.panel; cx.fillRect(0, 0, W, H);
      cx.strokeStyle = COL.grid; cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(PAD * 0.5, H / 2 + 0.5); cx.lineTo(W - PAD * 0.5, H / 2 + 0.5); cx.stroke();
      cx.beginPath(); cx.moveTo(W / 2 + 0.5, PAD * 0.5); cx.lineTo(W / 2 + 0.5, H - PAD * 0.5); cx.stroke();

      if (drawing && rawStroke.length > 1) {
        cx.strokeStyle = "hsla(31, 100%, 67%, 0.9)"; cx.lineWidth = 2; cx.beginPath();
        rawStroke.forEach((p, k) => { const q = padToPx(p[0], p[1]); k === 0 ? cx.moveTo(q[0], q[1]) : cx.lineTo(q[0], q[1]); });
        cx.stroke();
      }
      if (drawnPath.length < 2) {
        if (!drawing) {
          cx.fillStyle = COL.ghost; cx.textAlign = "center"; cx.font = "12px sans-serif";
          cx.fillText("draw a loop here — time →, pitch ↑", W / 2, H / 2 - 6);
        }
        return;
      }
      cx.strokeStyle = "hsla(31, 100%, 67%, 0.5)"; cx.lineWidth = 1.5; cx.beginPath();
      drawnPath.forEach((p, k) => { const q = padToPx(p[0], p[1]); k === 0 ? cx.moveTo(q[0], q[1]) : cx.lineTo(q[0], q[1]); });
      cx.closePath(); cx.stroke();

      const n = REST.length, phase = beats / period;
      cx.fillStyle = COL.note;
      for (let i = 0; i < n; i++) {
        const s = samplePath(drawnPath, phase + spread * (i / n));
        const q = padToPx(s[0], s[1]);
        cx.beginPath(); cx.arc(q[0], q[1], 4, 0, 2 * Math.PI); cx.fill();
      }
    }

    function paint(beats) {
      if (MODES[index].id === "path") drawPad(beats);
      else draw(beats);
    }

    let t0 = null;
    function frame(now) {
      if (t0 === null) t0 = now;
      paint(((now - t0) / 1000) * PREVIEW_BPS * speed);
      requestAnimationFrame(frame);
    }

    // ----- carousel state ---------------------------------------------------
    let index = 0;
    if (CONFIG.activeModeId) {
      const k = MODES.findIndex((m) => m.id === CONFIG.activeModeId);
      if (k >= 0) index = k;
    }
    function render() {
      const m = MODES[index];
      document.getElementById("name").textContent = m.name;
      document.getElementById("count").textContent = (index + 1) + " / " + MODES.length;
      document.getElementById("desc").textContent = m.description;
      const isDraw = m.id === "path";
      document.getElementById("drawControls").hidden = !isDraw;
      cv.style.cursor = isDraw ? "crosshair" : "default";
    }
    function step(delta) {
      index = (index + delta + MODES.length) % MODES.length;
      render();
    }

    document.getElementById("prev").onclick = () => step(-1);
    document.getElementById("next").onclick = () => step(1);
    document.getElementById("apply").onclick = () => closeWith("apply", MODES[index].id);
    document.getElementById("close").onclick = () => closeWith("close", null);
    document.getElementById("stop").onclick = () => closeWith("stop", null);

    // ----- amplitude sliders + snap-to-key toggle ---------------------------
    const widthEl = document.getElementById("width");
    const heightEl = document.getElementById("height");
    const speedEl = document.getElementById("speed");
    const snapEl = document.getElementById("snap");
    const widthVal = document.getElementById("widthVal");
    const heightVal = document.getElementById("heightVal");
    const speedVal = document.getElementById("speedVal");
    const fmt = (v) => (Math.round(v * 100) / 100) + "×";
    function syncLabels() {
      widthVal.textContent = fmt(width);
      heightVal.textContent = fmt(height);
      speedVal.textContent = fmt(speed);
    }
    widthEl.value = width; heightEl.value = height; speedEl.value = speed;
    snapEl.checked = snap;
    widthEl.oninput = () => { width = parseFloat(widthEl.value); syncLabels(); };
    heightEl.oninput = () => { height = parseFloat(heightEl.value); syncLabels(); };
    speedEl.oninput = () => { speed = parseFloat(speedEl.value); syncLabels(); };
    snapEl.onchange = () => { snap = snapEl.checked; };
    syncLabels();
    document.getElementById("scaleName").textContent =
      SCALE.intervals && SCALE.intervals.length
        ? "(" + NOTE_NAMES[(((SCALE.root % 12) + 12) % 12)] + ")"
        : "(scale off)";

    // ----- draw pad: pointer drawing + controls -----------------------------
    const spreadEl = document.getElementById("spread");
    const loopEl = document.getElementById("loop");
    spreadEl.value = spread;
    loopEl.value = String(period);
    spreadEl.oninput = () => { spread = parseFloat(spreadEl.value); };
    loopEl.onchange = () => { period = parseFloat(loopEl.value) || DEFAULT_PERIOD; };
    document.getElementById("clearPath").onclick = () => { drawnPath = []; };

    // Resample a freehand stroke into N points evenly spaced around the CLOSED
    // loop (closing segment included), so the path loops smoothly.
    function resampleClosed(raw, N) {
      const pts = [];
      for (const p of raw) { const l = pts[pts.length - 1]; if (!l || l[0] !== p[0] || l[1] !== p[1]) pts.push(p); }
      if (pts.length < 2) return [];
      const seg = []; let total = 0;
      for (let k = 0; k < pts.length; k++) {
        const a = pts[k], b = pts[(k + 1) % pts.length];
        const d = Math.hypot(b[0] - a[0], b[1] - a[1]); seg.push(d); total += d;
      }
      if (total < 1e-6) return [];
      const out = []; let k = 0, acc = 0;
      for (let s = 0; s < N; s++) {
        const target = (s / N) * total;
        while (k < pts.length - 1 && acc + seg[k] < target) { acc += seg[k]; k++; }
        const a = pts[k], b = pts[(k + 1) % pts.length], segLen = seg[k] || 1e-6;
        const f = (target - acc) / segLen;
        out.push([a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f]);
      }
      return out;
    }

    function padPoint(e) {
      const rect = cv.getBoundingClientRect();
      return pxToNorm((e.clientX - rect.left) * (W / rect.width), (e.clientY - rect.top) * (H / rect.height));
    }
    cv.addEventListener("pointerdown", (e) => {
      if (MODES[index].id !== "path") return;
      drawing = true; rawStroke = [padPoint(e)];
      try { cv.setPointerCapture(e.pointerId); } catch (err) { /* not all webviews */ }
      e.preventDefault();
    });
    cv.addEventListener("pointermove", (e) => { if (drawing) rawStroke.push(padPoint(e)); });
    cv.addEventListener("pointerup", () => {
      if (!drawing) return; drawing = false;
      if (rawStroke.length >= 2) { const rs = resampleClosed(rawStroke, 48); if (rs.length >= 2) drawnPath = rs; }
    });

    // ----- share codes (export / import) ------------------------------------
    const b64e = (str) => btoa(unescape(encodeURIComponent(str))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    const b64d = (s) => { s = s.replace(/-/g, "+").replace(/_/g, "/"); while (s.length % 4) s += "="; return decodeURIComponent(escape(atob(s))); };
    function currentShareObj() {
      const m = MODES[index].id;
      const o = { v: 1, m, w: Math.round(width * 100), h: Math.round(height * 100), k: snap ? 1 : 0, b: period, sp: Math.round(speed * 100) };
      if (m === "path" && drawnPath.length >= 2) {
        o.s = Math.round(spread * 100);
        o.p = drawnPath.map((pt) => [Math.round(pt[0] * 127), Math.round(pt[1] * 127)]);
      }
      return o;
    }
    function applyShareObj(o) {
      const k = MODES.findIndex((m) => m.id === o.m);
      if (k >= 0) index = k;
      if (typeof o.w === "number") width = clampNum(o.w / 100, 0.25, 3);
      if (typeof o.h === "number") height = clampNum(o.h / 100, 0.25, 3);
      snap = !!o.k;
      if (typeof o.sp === "number") speed = clampNum(o.sp / 100, 0.1, 2);
      if (typeof o.b === "number" && o.b > 0) period = o.b;
      if (o.m === "path" && Array.isArray(o.p)) {
        drawnPath = o.p.map((pt) => [clampNum(pt[0] / 127, -1, 1), clampNum(pt[1] / 127, -1, 1)]);
        spread = typeof o.s === "number" ? clampNum(o.s / 100, 0, 1) : 0;
      }
      widthEl.value = width; heightEl.value = height; speedEl.value = speed;
      snapEl.checked = snap;
      spreadEl.value = spread; loopEl.value = String(period);
      syncLabels(); render();
    }

    const sharePanel = document.getElementById("sharePanel");
    const shareText = document.getElementById("shareText");
    const shareDo = document.getElementById("shareDo");
    const shareHint = document.getElementById("shareHint");
    let shareMode = null;
    function openShare(mode) {
      shareMode = mode; sharePanel.hidden = false; shareHint.textContent = "";
      if (mode === "export") {
        shareText.readOnly = true; shareText.value = "mm1:" + b64e(JSON.stringify(currentShareObj()));
        shareDo.textContent = "Copy"; shareText.focus(); shareText.select();
      } else {
        shareText.readOnly = false; shareText.value = ""; shareText.placeholder = "Paste a midiMove code (mm1:…)";
        shareDo.textContent = "Load"; shareText.focus();
      }
    }
    document.getElementById("exportBtn").onclick = () => openShare("export");
    document.getElementById("importBtn").onclick = () => openShare("import");
    document.getElementById("shareCancel").onclick = () => { sharePanel.hidden = true; };
    shareDo.onclick = () => {
      if (shareMode === "export") {
        shareText.select();
        try { document.execCommand("copy"); shareHint.textContent = "Copied!"; }
        catch (e) { shareHint.textContent = "Press Ctrl+C"; }
      } else {
        try {
          let code = shareText.value.trim();
          if (code.indexOf("mm1:") === 0) code = code.slice(4);
          applyShareObj(JSON.parse(b64d(code)));
          sharePanel.hidden = true;
        } catch (e) { shareHint.textContent = "Invalid code"; }
      }
    };

    if (CONFIG.activeModeId) {
      const am = MODES.find((m) => m.id === CONFIG.activeModeId);
      if (am) {
        document.getElementById("running").hidden = false;
        document.getElementById("runningName").textContent = am.name;
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") step(-1);
      else if (e.key === "ArrowRight") step(1);
      else if (e.key === "Enter") closeWith("apply", MODES[index].id);
      else if (e.key === "Escape") closeWith("close", null);
    });

    render();
    requestAnimationFrame(frame);
    document.getElementById("apply").focus();
  </script>
</body>

</html>
